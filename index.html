<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saiyan Valley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Pixelify Sans (chu co dau, font chinh) + Press Start 2P (logo ASCII).
       Bo Handjet: chi la fallback dung sau Pixelify Sans nen khong bao gio hien -> bot 1 luot tai font. -->
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== KHUNG GAME (hiện sau khi tạo nhân vật) ===== -->
  <main id="game-console" class="console hidden">
    <div class="titlebar"><span class="deco">*</span> SAIYAN VALLEY <span class="deco">*</span></div>

    <!-- HUD trên: chân dung + chỉ số -->
    <div class="hud">
      <div class="win stats">
        <div class="portrait"><canvas id="portrait" width="32" height="32"></canvas></div>
        <div class="statinfo">
          <div class="nameline"><span id="hud-name">ARIN</span><span class="lv" id="hud-lv">LV 1</span></div>
          <div class="stline"><span class="lab hpl">HP</span>
            <div class="bar"><div id="hpfill" class="bar-fill hp"></div></div>
            <span id="hptext" class="num">100/100</span></div>
          <div class="stline"><span class="lab kil">KI</span>
            <div class="bar"><div id="kifill" class="bar-fill ki"></div></div>
            <span id="kitext" class="num">100/100</span></div>
          <div class="gold"><span class="bean"></span><span id="beantext">0</span> ĐẬU THẦN</div>
        </div>
      </div>
    </div>

    <!-- Sân khấu: bản đồ + minimap -->
    <div class="stage">
      <canvas id="game-canvas"></canvas>
      <div class="win minimap">
        <div class="mm-title">BẢN ĐỒ</div>
        <canvas id="minimap" width="40" height="24"></canvas>
      </div>
      <div class="hint"><span class="key">E</span> CUỐC/GIEO/THU HOẠCH &nbsp; <span class="key">R</span> TƯỚI &nbsp; <span class="key">SHIFT</span> CHẠY</div>
    </div>

    <!-- Phía dưới: hộp thoại + nút lệnh -->
    <div class="bottom">
      <div class="win dialog">
        <div id="dlgname" class="dlg-name">HỆ THỐNG</div>
        <div id="dlgtext" class="dlg-text"></div>
        <span id="dlgcursor" class="dlg-cursor"></span>
      </div>
      <div class="cmds">
        <button type="button" class="btn" data-cmd="bag"><span class="ico"></span>TÚI ĐỒ</button>
        <button type="button" class="btn" data-cmd="map"><span class="ico"></span>BẢN ĐỒ</button>
        <button type="button" class="btn" data-cmd="char"><span class="ico"></span>NHÂN VẬT</button>
      </div>
    </div>
  </main>

  <!-- ===== Màn hình ĐĂNG NHẬP / ĐĂNG KÝ (màn hình tiêu đề) ===== -->
  <div id="auth-screen" class="screen">
    <canvas id="title-bg" class="title-bg"></canvas>
    <div class="title-wrap">
      <div class="logo-float"><h1 class="logo">SAIYAN VALLEY</h1></div>
      <p class="tagline">TRỒNG ĐẬU THẦN · LUYỆN SỨC MẠNH</p>
      <div class="panel win">
      <div class="tabs">
        <button id="tab-login" type="button" class="tab active">ĐĂNG NHẬP</button>
        <button id="tab-register" type="button" class="tab">ĐĂNG KÝ</button>
      </div>
      <form id="auth-form" autocomplete="off">
        <label>TÊN ĐĂNG NHẬP
          <input id="auth-username" type="text" maxlength="16" placeholder="vd: arin" />
        </label>
        <label>MẬT KHẨU
          <input id="auth-password" type="password" maxlength="32" placeholder="****" />
        </label>
        <label id="auth-confirm-row" class="hidden">NHẬP LẠI MẬT KHẨU
          <input id="auth-confirm" type="password" maxlength="32" placeholder="****" />
        </label>
        <p id="auth-msg" class="msg"></p>
        <button id="auth-submit" type="submit" class="btn-primary">ĐĂNG NHẬP</button>
        <p class="hint">Tài khoản dùng thử: <b>admin</b> / <b>1234</b></p>
      </form>
      </div>
    </div>
  </div>

  <!-- ===== Màn hình TẠO NHÂN VẬT ===== -->
  <div id="char-screen" class="screen hidden">
    <div class="panel win">
      <h1 class="screen-title">TẠO NHÂN VẬT</h1>
      <div class="char-layout">
        <canvas id="char-preview" width="32" height="40"></canvas>
        <div class="char-fields">
          <label>TÊN NHÂN VẬT
            <input id="char-name" type="text" maxlength="12" placeholder="vd: goku" />
          </label>
          <p class="field-label">NHÂN VẬT</p>
          <div id="char-swatches" class="swatches"></div>
          <p class="field-label">TRANG PHỤC</p>
          <div id="outfit-swatches" class="swatches"></div>
        </div>
      </div>
      <p id="char-msg" class="msg"></p>
      <div class="char-actions">
        <button id="char-back" type="button" class="btn-secondary">ĐĂNG XUẤT</button>
        <button id="char-start" type="button" class="btn-primary">BẮT ĐẦU</button>
      </div>
    </div>
  </div>

  <!-- Tải theo thứ tự. Dùng <script> thường (KHÔNG phải module) để double-click vẫn chạy.
       defer: tải song song trong lúc parse HTML, chạy sau khi parse xong & GIỮ ĐÚNG THỨ TỰ. -->
  <script defer src="src/game.js"></script>
  <script defer src="src/input.js"></script>
  <script defer src="src/player.js"></script>
  <script defer src="src/world.js"></script>
  <script defer src="src/hud.js"></script>
  <script defer src="src/title.js"></script>
  <script defer src="src/auth.js"></script>
  <script defer src="src/screens.js"></script>
  <script defer src="src/main.js"></script>
</body>
</html>
